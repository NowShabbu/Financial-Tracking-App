<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FinTrackr · BDT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f5f7fb; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .card-shadow { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02); }
    .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .balance-badge { background: rgba(0,0,0,0.02); border-radius: 40px; padding: 4px 14px; font-size: 0.8rem; }
    .negative { color: #d0304a; }
    .positive { color: #1a8c4a; }
    .service-charge { color: #c92a4a; font-weight: 600; }
    .lost-charge { color: #b33c5a; font-weight: 600; }
    .transaction-item { transition: all 0.1s ease; }
    .transaction-item:active { background: #f0f3f9; }
    .pin-dot { letter-spacing: 6px; font-family: monospace; }
    .logo-symbol { background: linear-gradient(145deg, #1e293b, #0f172a); width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; }
    .theme-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .theme-dot { width: 28px; height: 28px; border-radius: 30px; border: 2px solid transparent; transition: 0.1s; cursor: pointer; }
    .theme-dot.active { border-color: #0f172a; transform: scale(1.1); }
    input, select, textarea { background: white; border: 1px solid #e9edf2; border-radius: 16px; padding: 12px 16px; font-size: 0.95rem; width: 100%; transition: 0.1s; }
    input:focus, select:focus { outline: none; border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(15,23,42,0.05); }
    .btn-primary { background: #0f172a; color: white; border-radius: 40px; padding: 12px 24px; font-weight: 500; transition: 0.1s; border: none; }
    .btn-primary:active { opacity: 0.7; transform: scale(0.97); }
    .btn-outline { background: transparent; border: 1px solid #d1d9e6; border-radius: 40px; padding: 10px 20px; }
    .card-item { background: white; border-radius: 28px; padding: 20px; margin-bottom: 14px; border: 1px solid #f0f4fe; }
    .bg-soft { background: #f8faff; }
    .tab-active { border-bottom: 3px solid #0f172a; padding-bottom: 6px; font-weight: 500; }
    .actual-balance-input { background: #f8faff; border: 1px dashed #b9c4d4; }
    .pin-visible { font-family: 'Courier New', monospace; font-weight: 600; letter-spacing: 2px; background: #f1f4f9; padding: 2px 10px; border-radius: 20px; font-size: 0.85rem; }
    /* Animation for login screen */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-animate {
      animation: fadeInUp 0.8s ease-out forwards;
    }
    .logo-pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .credit-footer {
      font-size: 0.7rem;
      color: #94a3b8;
      text-align: center;
      padding: 16px 0 4px 0;
      border-top: 1px solid #e9edf2;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div id="app" class="max-w-md mx-auto px-4 py-6 pb-24 relative min-h-screen" style="background: #f5f7fb;">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="flex flex-col items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-sm bg-white p-8 rounded-3xl card-shadow login-animate">
      <div class="flex justify-center mb-4">
        <div class="logo-symbol logo-pulse"><i class="fas fa-coins"></i></div>
      </div>
      <h2 class="text-2xl font-semibold text-center text-slate-800">FinTrackr</h2>
      <p class="text-sm text-slate-400 text-center">by XED Tech.</p>
      <p class="text-xs text-slate-300 text-center mb-6">transaction tracker</p>
      <div class="space-y-4">
        <div>
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Code</label>
          <input type="text" id="loginCode" placeholder="your code" class="mt-1" value="demo">
        </div>
        <div>
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••" class="mt-1" value="1234">
        </div>
        <button id="loginBtn" class="btn-primary w-full mt-2"><i class="fas fa-arrow-right mr-2"></i>Unlock</button>
        <p class="text-xs text-center text-slate-400 mt-2">default: demo / 1234</p>
      </div>
      <div class="credit-footer mt-6">
        Product of XED Tech.
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appScreen" class="hidden">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="logo-symbol"><i class="fas fa-coins"></i></div>
        <span class="text-xl font-semibold text-slate-800">FinTrackr</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="themeToggleBtn" class="text-slate-500 text-sm bg-white/70 p-2 rounded-full card-shadow"><i class="fas fa-palette"></i></button>
        <button id="logoutBtn" class="text-slate-400 text-sm"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>

    <!-- Theme picker -->
    <div id="themePicker" class="bg-white p-4 rounded-2xl card-shadow mb-4 hidden">
      <p class="text-xs font-medium text-slate-500 mb-2">choose accent color</p>
      <div class="theme-picker" id="themeColorOptions">
        <div class="theme-dot active" style="background:#0f172a;" data-color="#0f172a"></div>
        <div class="theme-dot" style="background:#2563eb;" data-color="#2563eb"></div>
        <div class="theme-dot" style="background:#7c3aed;" data-color="#7c3aed"></div>
        <div class="theme-dot" style="background:#0d9488;" data-color="#0d9488"></div>
        <div class="theme-dot" style="background:#d946ef;" data-color="#d946ef"></div>
        <div class="theme-dot" style="background:#ea580c;" data-color="#ea580c"></div>
      </div>
    </div>

    <!-- ADD BUTTONS -->
    <div class="grid grid-cols-3 gap-2 mb-6">
      <button id="addCardBtn" class="bg-white p-3 rounded-2xl card-shadow flex flex-col items-center"><i class="fas fa-credit-card text-xl text-slate-700"></i><span class="text-xs mt-1">Card</span></button>
      <button id="addMobileBtn" class="bg-white p-3 rounded-2xl card-shadow flex flex-col items-center"><i class="fas fa-mobile-alt text-xl text-slate-700"></i><span class="text-xs mt-1">Mobile</span></button>
      <button id="addWalletBtn" class="bg-white p-3 rounded-2xl card-shadow flex flex-col items-center"><i class="fas fa-wallet text-xl text-slate-700"></i><span class="text-xs mt-1">Wallet</span></button>
    </div>

    <!-- ACCOUNT LIST -->
    <div id="accountList" class="space-y-4">
      <!-- dynamic -->
    </div>

    <!-- Credit Footer -->
    <div class="credit-footer mt-8">
      Product of XED Tech.
    </div>

    <!-- MODAL -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-end justify-center z-50 hidden">
      <div class="bg-white w-full max-w-md rounded-t-3xl p-6 pb-8 max-h-[90vh] overflow-y-auto" id="modalContent">
        <!-- dynamic -->
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    // ----- hardcoded credentials -----
    const VALID_CODE = 'demo';
    const VALID_PWD = '1234';

    // ----- state -----
    let accounts = [];
    let nextId = 1;
    let selectedAccountId = null;
    let currentTheme = '#0f172a';

    // DOM refs
    const loginScreen = document.getElementById('loginScreen');
    const appScreen = document.getElementById('appScreen');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const addCardBtn = document.getElementById('addCardBtn');
    const addMobileBtn = document.getElementById('addMobileBtn');
    const addWalletBtn = document.getElementById('addWalletBtn');
    const accountList = document.getElementById('accountList');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalContent = document.getElementById('modalContent');
    const themePicker = document.getElementById('themePicker');
    const themeToggleBtn = document.getElementById('themeToggleBtn');

    // helpers
    function formatBDT(amount) {
      return '৳ ' + new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 }).format(amount);
    }

    function getAccount(id) { return accounts.find(a => a.id === id); }

    // recalc balance from transactions only (calculated balance)
    function recalcBalance(acc) {
      let bal = acc.openingBalance || 0;
      (acc.transactions || []).forEach(tx => {
        if (tx.type === 'cashin') bal += tx.amount;
        else if (tx.type === 'cashout') bal -= (tx.amount + (tx.extraCharge || 0));
        else if (tx.type === 'cashpayment') bal -= (tx.amount + (tx.extraCharge || 0));
        else if (tx.type === 'onlinepayment') bal -= (tx.amount + (tx.extraCharge || 0));
      });
      acc.calculatedBalance = bal;
      // service charge / lost = actualBalance - calculatedBalance
      if (acc.actualBalance !== undefined && acc.actualBalance !== null) {
        if (acc.type === 'card' || acc.type === 'mobile') {
          acc.serviceCharge = acc.actualBalance - acc.calculatedBalance;
        } else if (acc.type === 'wallet') {
          acc.lostInTransaction = acc.actualBalance - acc.calculatedBalance;
        }
      } else {
        if (acc.type === 'card' || acc.type === 'mobile') {
          acc.serviceCharge = (acc.openingBalance || 0) - acc.calculatedBalance;
        } else if (acc.type === 'wallet') {
          acc.lostInTransaction = (acc.openingBalance || 0) - acc.calculatedBalance;
        }
      }
      return bal;
    }

    // render all accounts
    function renderAccounts() {
      if (!accountList) return;
      if (accounts.length === 0) {
        accountList.innerHTML = `<div class="text-center text-slate-400 text-sm py-10 bg-white/60 rounded-3xl"><i class="fas fa-plus-circle text-2xl block mb-2"></i>Add your first account</div>`;
        return;
      }
      let html = '';
      accounts.forEach(acc => {
        recalcBalance(acc);
        const bal = acc.calculatedBalance;
        const isCard = acc.type === 'card';
        const isMobile = acc.type === 'mobile';
        const isWallet = acc.type === 'wallet';
        let diff = 0, diffLabel = '';
        if (isCard || isMobile) {
          diff = acc.serviceCharge || 0;
          diffLabel = 'service charge';
        } else if (isWallet) {
          diff = acc.lostInTransaction || 0;
          diffLabel = 'lost in tx';
        }
        const themeColor = acc.theme || currentTheme;
        html += `<div class="card-item relative" style="border-left: 6px solid ${themeColor};">`;
        html += `<div class="flex justify-between items-start">`;
        html += `<div><div class="flex items-center gap-2 flex-wrap"><span class="text-lg font-medium">${acc.name || 'Account'}</span>`;
        if (acc.last4) html += `<span class="text-xs bg-slate-100 px-2 py-0.5 rounded-full">••${acc.last4}</span>`;
        // Show PIN if exists (visible)
        if (acc.pin) html += `<span class="pin-visible text-xs"><i class="fas fa-key mr-1 text-slate-400"></i>${acc.pin}</span>`;
        html += `</div><div class="text-xs text-slate-400 mt-0.5">${acc.type.toUpperCase()}</div></div>`;
        html += `<div class="flex gap-1"><button class="tx-add-btn text-xs bg-slate-100 px-3 py-1 rounded-full" data-id="${acc.id}"><i class="fas fa-plus mr-1"></i>tx</button>`;
        html += `<button class="edit-account-btn text-xs text-slate-400 px-2" data-id="${acc.id}"><i class="fas fa-edit"></i></button></div></div>`;

        // Balance display with actual balance input
        html += `<div class="flex flex-col gap-1 mt-3">`;
        html += `<div class="flex justify-between items-center"><span class="text-sm font-medium">Calculated Balance</span><span class="text-xl font-semibold">${formatBDT(bal)}</span></div>`;
        const actualVal = (acc.actualBalance !== undefined && acc.actualBalance !== null) ? acc.actualBalance : '';
        html += `<div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl"><span class="text-sm text-slate-500">Actual balance (bank app)</span>`;
        html += `<input type="number" class="actual-balance-input w-32 text-right text-sm font-medium p-1 rounded-lg" data-accid="${acc.id}" value="${actualVal}" placeholder="enter" step="0.01" />`;
        html += `</div></div>`;

        if (acc.actualBalance !== undefined && acc.actualBalance !== null && acc.actualBalance !== '') {
          const diffVal = acc.actualBalance - bal;
          const diffColor = diffVal < 0 ? 'service-charge' : 'positive';
          html += `<div class="flex justify-between text-xs mt-1 ${diffColor}"><span>${diffLabel}</span><span>${formatBDT(diffVal)}</span></div>`;
        } else {
          html += `<div class="flex justify-between text-xs mt-1 text-slate-400"><span>${diffLabel}</span><span>—</span></div>`;
        }

        // Transactions list
        if (acc.transactions && acc.transactions.length) {
          html += `<div class="mt-3 space-y-1 border-t border-slate-100 pt-2">`;
          const sorted = [...acc.transactions].reverse();
          sorted.forEach(tx => {
            let sign = '';
            let color = 'text-slate-700';
            let amount = tx.amount;
            if (tx.type === 'cashin') { sign = '+'; color = 'positive'; }
            else if (tx.type === 'cashout') { sign = '-'; color = 'negative'; }
            else if (tx.type === 'cashpayment') { sign = '-'; color = 'negative'; }
            else if (tx.type === 'onlinepayment') { sign = '-'; color = 'negative'; }
            const label = tx.type.replace('cash','').replace('payment',' pay');
            html += `<div class="flex justify-between text-sm transaction-item py-1 px-2 rounded-xl"><span>${tx.date || ''} <span class="text-slate-400 text-xs">${label}</span> ${tx.purpose || tx.source || tx.to || ''}</span><span class="${color} font-medium">${sign}${formatBDT(Math.abs(amount))}</span></div>`;
            if (tx.extraCharge) {
              html += `<div class="flex justify-end text-xs service-charge"><span>extra: ${formatBDT(tx.extraCharge)}</span></div>`;
            }
          });
          html += `</div>`;
        }
        html += `</div>`;
      });
      accountList.innerHTML = html;

      // attach events
      document.querySelectorAll('.tx-add-btn').forEach(el => {
        el.addEventListener('click', (e) => {
          const id = parseInt(el.dataset.id);
          selectedAccountId = id;
          openTransactionModal(id);
        });
      });
      document.querySelectorAll('.edit-account-btn').forEach(el => {
        el.addEventListener('click', (e) => {
          const id = parseInt(el.dataset.id);
          selectedAccountId = id;
          openEditAccountModal(id);
        });
      });
      document.querySelectorAll('.actual-balance-input').forEach(inp => {
        inp.addEventListener('change', function() {
          const accId = parseInt(this.dataset.accid);
          const acc = getAccount(accId);
          if (!acc) return;
          const val = parseFloat(this.value);
          if (!isNaN(val) && val !== null) {
            acc.actualBalance = val;
          } else {
            acc.actualBalance = undefined;
          }
          recalcBalance(acc);
          renderAccounts();
        });
      });
    }

    // ----- MODAL: add account -----
    function openAddAccountModal(type) {
      const isCard = type === 'card';
      const isMobile = type === 'mobile';
      const isWallet = type === 'wallet';
      let html = `<div class="flex justify-between items-center mb-4"><h3 class="text-xl font-semibold">Add ${type}</h3><button class="closeModalBtn text-slate-400"><i class="fas fa-times"></i></button></div>`;
      html += `<div class="space-y-3">`;
      html += `<div><label class="text-xs font-medium">Name</label><input id="accName" placeholder="${type} name" value="${type} 1" /></div>`;
      if (isCard || isMobile) {
        html += `<div><label class="text-xs font-medium">Last 4 digits</label><input id="accLast4" placeholder="1234" maxlength="4" /></div>`;
        html += `<div><label class="text-xs font-medium">PIN (visible for your reference)</label><input id="accPin" placeholder="e.g. 1234" type="text" /></div>`;
      }
      html += `<div><label class="text-xs font-medium">Opening balance?</label><div class="flex gap-4"><label><input type="radio" name="hasOpening" value="yes" checked> Yes</label><label><input type="radio" name="hasOpening" value="no"> No</label></div></div>`;
      html += `<div id="openingBalanceField"><label class="text-xs font-medium">Opening balance</label><input id="accOpening" type="number" placeholder="0.00" value="0" /></div>`;
      html += `<div><label class="text-xs font-medium">Theme color</label><div class="flex gap-2 flex-wrap">`;
      ['#0f172a','#2563eb','#7c3aed','#0d9488','#d946ef','#ea580c'].forEach(c => {
        html += `<div class="theme-dot ${currentTheme===c?'active':''}" style="background:${c};" data-color="${c}"></div>`;
      });
      html += `</div></div>`;
      html += `<button id="saveAccountBtn" class="btn-primary w-full mt-2">Add ${type}</button>`;
      html += `</div>`;
      modalContent.innerHTML = html;
      modalOverlay.classList.remove('hidden');

      modalContent.querySelectorAll('.theme-dot').forEach(dot => {
        dot.addEventListener('click', function() {
          modalContent.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
          this.classList.add('active');
        });
      });
      modalContent.querySelectorAll('input[name="hasOpening"]').forEach(el => {
        el.addEventListener('change', function() {
          const field = document.getElementById('openingBalanceField');
          if (this.value === 'yes') field.style.display = 'block';
          else field.style.display = 'none';
        });
      });
      modalContent.querySelector('.closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('saveAccountBtn').addEventListener('click', function() {
        const name = document.getElementById('accName').value || `${type} ${accounts.length+1}`;
        const last4 = document.getElementById('accLast4')?.value || '';
        const pin = document.getElementById('accPin')?.value || '';
        const hasOpening = document.querySelector('input[name="hasOpening"]:checked').value === 'yes';
        const opening = hasOpening ? parseFloat(document.getElementById('accOpening').value) || 0 : 0;
        let theme = currentTheme;
        const activeDot = modalContent.querySelector('.theme-dot.active');
        if (activeDot) theme = activeDot.dataset.color;
        const newAcc = {
          id: nextId++,
          type: type,
          name: name,
          last4: last4,
          pin: pin,
          openingBalance: opening,
          calculatedBalance: opening,
          actualBalance: undefined,
          transactions: [],
          theme: theme,
          serviceCharge: 0,
          lostInTransaction: 0
        };
        accounts.push(newAcc);
        closeModal();
        renderAccounts();
      });
    }

    function openTransactionModal(accountId) {
      const acc = getAccount(accountId);
      if (!acc) return;
      let html = `<div class="flex justify-between items-center mb-4"><h3 class="text-xl font-semibold">Add tx · ${acc.name}</h3><button class="closeModalBtn text-slate-400"><i class="fas fa-times"></i></button></div>`;
      html += `<div class="space-y-3">`;
      html += `<div><label class="text-xs font-medium">Type</label><select id="txType">`;
      html += `<option value="cashin">Cash In</option><option value="cashout">Cash Out</option><option value="cashpayment">Cash Payment</option><option value="onlinepayment">Online Payment</option>`;
      html += `</select></div>`;
      html += `<div><label class="text-xs font-medium">Date</label><input id="txDate" type="date" value="${new Date().toISOString().slice(0,10)}" /></div>`;
      html += `<div id="txSourceField"><label class="text-xs font-medium">From / To / Purpose</label><input id="txSource" placeholder="source, account or purpose" /></div>`;
      html += `<div><label class="text-xs font-medium">Amount</label><input id="txAmount" type="number" placeholder="0.00" /></div>`;
      html += `<div id="txExtraField"><label class="text-xs font-medium">Extra charge (if any)</label><input id="txExtra" type="number" placeholder="0.00" value="0" /></div>`;
      html += `<button id="saveTxBtn" class="btn-primary w-full mt-2">Add transaction</button>`;
      html += `</div>`;
      modalContent.innerHTML = html;
      modalOverlay.classList.remove('hidden');

      document.getElementById('txType').addEventListener('change', function() {
        const val = this.value;
        const label = document.querySelector('#txSourceField label');
        if (val === 'cashin') label.textContent = 'From (source)';
        else if (val === 'cashout') label.textContent = 'To (account)';
        else label.textContent = 'Purpose';
      });
      document.querySelector('.closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('saveTxBtn').addEventListener('click', function() {
        const type = document.getElementById('txType').value;
        const date = document.getElementById('txDate').value;
        const source = document.getElementById('txSource').value;
        const amount = parseFloat(document.getElementById('txAmount').value) || 0;
        const extra = parseFloat(document.getElementById('txExtra').value) || 0;
        if (!amount) { alert('enter amount'); return; }
        const tx = { type, date, amount, extraCharge: extra };
        if (type === 'cashin') tx.source = source;
        else if (type === 'cashout') tx.to = source;
        else tx.purpose = source;
        acc.transactions.push(tx);
        recalcBalance(acc);
        closeModal();
        renderAccounts();
      });
    }

    function openEditAccountModal(accountId) {
      const acc = getAccount(accountId);
      if (!acc) return;
      let html = `<div class="flex justify-between items-center mb-4"><h3 class="text-xl font-semibold">Edit ${acc.type}</h3><button class="closeModalBtn text-slate-400"><i class="fas fa-times"></i></button></div>`;
      html += `<div class="space-y-3"><div><label class="text-xs font-medium">Name</label><input id="editName" value="${acc.name}" /></div>`;
      if (acc.last4 !== undefined) html += `<div><label class="text-xs font-medium">Last 4</label><input id="editLast4" value="${acc.last4}" maxlength="4" /></div>`;
      if (acc.pin !== undefined) html += `<div><label class="text-xs font-medium">PIN (visible)</label><input id="editPin" value="${acc.pin || ''}" type="text" /></div>`;
      html += `<div><label class="text-xs font-medium">Opening balance</label><input id="editOpening" type="number" value="${acc.openingBalance}" /></div>`;
      html += `<button id="saveEditBtn" class="btn-primary w-full mt-2">Update</button></div>`;
      modalContent.innerHTML = html;
      modalOverlay.classList.remove('hidden');
      document.querySelector('.closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('saveEditBtn').addEventListener('click', function() {
        acc.name = document.getElementById('editName').value || acc.name;
        if (document.getElementById('editLast4')) acc.last4 = document.getElementById('editLast4').value;
        if (document.getElementById('editPin')) acc.pin = document.getElementById('editPin').value;
        const newOpen = parseFloat(document.getElementById('editOpening').value) || 0;
        acc.openingBalance = newOpen;
        recalcBalance(acc);
        closeModal();
        renderAccounts();
      });
    }

    function closeModal() {
      modalOverlay.classList.add('hidden');
    }

    // login
    loginBtn.addEventListener('click', function() {
      const code = document.getElementById('loginCode').value;
      const pwd = document.getElementById('loginPassword').value;
      if (code === VALID_CODE && pwd === VALID_PWD) {
        loginScreen.style.display = 'none';
        appScreen.classList.remove('hidden');
        renderAccounts();
      } else {
        alert('invalid code or password');
      }
    });

    logoutBtn.addEventListener('click', function() {
      loginScreen.style.display = 'flex';
      appScreen.classList.add('hidden');
    });

    addCardBtn.addEventListener('click', ()=> openAddAccountModal('card'));
    addMobileBtn.addEventListener('click', ()=> openAddAccountModal('mobile'));
    addWalletBtn.addEventListener('click', ()=> openAddAccountModal('wallet'));

    themeToggleBtn.addEventListener('click', function() {
      themePicker.classList.toggle('hidden');
    });
    document.querySelectorAll('#themeColorOptions .theme-dot').forEach(dot => {
      dot.addEventListener('click', function() {
        document.querySelectorAll('#themeColorOptions .theme-dot').forEach(d => d.classList.remove('active'));
        this.classList.add('active');
        currentTheme = this.dataset.color;
        renderAccounts();
      });
    });

    modalOverlay.addEventListener('click', function(e) {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    renderAccounts();
  })();
</script>
</body>
</html>
